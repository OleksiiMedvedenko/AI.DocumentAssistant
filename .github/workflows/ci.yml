name: ci

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore AI.DocumentAssistant.sln

      - name: Build
        run: dotnet build AI.DocumentAssistant.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test AI.DocumentAssistant.sln --no-build --configuration Release --logger "trx;LogFileName=test-results.trx"